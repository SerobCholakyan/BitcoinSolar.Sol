<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BLSR Miner — Web Rig</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/ethers/6.7.1/ethers.umd.min.js"></script>
</head>
<body>
  <div id="app">
    <header class="top-bar">
      <div class="logo">BLSR MINER</div>
      <button id="connect-btn" class="btn primary">Connect Wallet</button>
    </header>

    <main class="grid">
      <section class="panel">
        <h2>Rig Status</h2>
        <div id="status-text">Disconnected</div>
        <div id="address-text" class="muted"></div>
        <button id="start-mining-btn" class="btn" disabled>Start Mining</button>
        <p class="muted small">
          For full hashrate, download the native miner and point it at your backend.
        </p>
      </section>

      <section class="panel">
        <h2>Network</h2>
        <div>Difficulty: <span id="difficulty-value">–</span></div>
        <div>Total Jobs: <span id="total-jobs-value">–</span></div>
      </section>

      <section class="panel">
        <h2>Your Mining</h2>
        <div>Last Status: <span id="last-status">–</span></div>
        <div>Last Message: <span id="last-message">–</span></div>
      </section>
    </main>
  </div>

  <script src="api.js" type="module"></script>
  <script src="app.js" type="module"></script>
</body>
</html>
