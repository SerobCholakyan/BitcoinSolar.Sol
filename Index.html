<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BLSR Miner — Singularity Engine</title>

<style>
/* --- Base Styling --- */
html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  overflow: hidden;
  background: #050510;
  font-family: 'Segoe UI', sans-serif;
  color: white;
}

/* --- Wallpaper --- */
#wallpaper {
  position: absolute;
  top: 0; left: 0;
  width: 100vw; height: 100vh;
  background: radial-gradient(circle at center, #0f172a 0%, #000 100%);
  overflow: hidden;
  z-index: 1;
}

/* --- Floating Bubbles --- */
.bubble {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(255,255,255,0.15);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3), inset 0 0 10px rgba(255,255,255,0.05);
  backdrop-filter: blur(4px);
  display: flex; justify-content: center; align-items: center;
  will-change: transform, opacity;
}

.bubble img {
  width: 60%; height: 60%;
  filter: drop-shadow(0 0 5px rgba(255,255,255,0.2));
}

/* --- Black Hole Singularity --- */
.bubble.blsr.singularity {
  transform: scale(2.8) rotate(360deg);
  background: black;
  border-color: #fbbf24;
  box-shadow:
    0 0 60px 25px rgba(247,147,26,0.7),
    inset 0 0 40px rgba(0,0,0,1),
    0 0 120px 50px rgba(138,43,226,0.5);
  z-index: 100;
  transition: all 1.5s cubic-bezier(0.25,0.8,0.25,1);
}

/* --- Particle Burst --- */
.particle {
  position: absolute;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: #f97316;
  box-shadow: 0 0 10px rgba(249,115,22,0.9);
  opacity: 1;
  transform: scale(1);
  transition: transform 0.6s ease-out, opacity 0.6s ease-out;
}

/* --- Gravity Wave --- */
.gravity-wave {
  position: absolute;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 2px solid rgba(129,140,248,0.9);
  box-shadow: 0 0 25px rgba(129,140,248,0.9);
  opacity: 0.9;
  transform: scale(0.2);
  transition: transform 1.2s ease-out, opacity 1.2s ease-out;
}

/* --- Miner UI --- */
#miner-ui {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  z-index: 10;
  background: rgba(0,0,0,0.6);
  padding: 40px;
  border-radius: 15px;
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
  text-align: center;
  box-shadow: 0 10px 30px rgba(0,0,0,0.8);
  transition: all 0.3s ease;
}

#miner-ui.block-solved {
  box-shadow: 0 0 40px rgba(250,204,21,0.9);
  border-color: rgba(250,204,21,0.8);
  transform: translate(-50%, -50%) scale(1.03);
}

button {
  background: linear-gradient(45deg, #f7931a, #e87b05);
  border: none;
  padding: 15px 30px;
  color: white;
  font-size: 1.2rem;
  border-radius: 8px;
  cursor: pointer;
  margin-top: 20px;
  box-shadow: 0 4px 15px rgba(247,147,26,0.4);
  transition: transform 0.2s;
}
button:hover { transform: scale(1.05); }
</style>
</head>

<body>

<div id="wallpaper"></div>

<div id="miner-ui">
  <h1 style="color:#f7931a;">BitcoinSolar (BLSR)</h1>
  <p id="wallet">Wallet: Not connected</p>
  <p id="difficulty">Difficulty: loading…</p>
  <p id="miner-status" style="color:#4ade80;">Status: Idle</p>
  <p id="last-tx" style="font-size:0.8rem;color:#9ca3af;">Last TX: none</p>
  <button id="connect-btn">Connect Wallet</button>
  <button id="mine-btn" disabled>Start Mining</button>
</div>

<audio id="blackhole-sfx" src="sounds/blackhole_woosh.mp3" preload="auto"></audio>

<script>
/* ---------------------------------------------------------
   META MASK + BACKEND INTEGRATION
--------------------------------------------------------- */

let userAddress = null;

async function connectWallet() {
  if (!window.ethereum) {
    alert("MetaMask not detected");
    return;
  }

  const accounts = await ethereum.request({ method: "eth_requestAccounts" });
  userAddress = accounts[0];

  document.getElementById("wallet").textContent =
    "Wallet: " + userAddress.slice(0,6) + "..." + userAddress.slice(-4);

  document.getElementById("mine-btn").disabled = false;
}

document.getElementById("connect-btn").onclick = connectWallet;

async function startMining() {
  if (!userAddress) return;

  minerStatus.textContent = "Submitting mining request…";

  const res = await fetch("/mine", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ address: userAddress })
  });

  const data = await res.json();

  if (data.status === "submitted") {
    minerStatus.textContent = "Mining… waiting for block confirmation";
    onBlockSolved("Mining TX submitted");
  }
}

document.getElementById("mine-btn").onclick = startMining;

/* ---------------------------------------------------------
   LIVE DIFFICULTY POLLING
--------------------------------------------------------- */

async function updateDifficulty() {
  const res = await fetch("/get_difficulty");
  const data = await res.json();
  document.getElementById("difficulty").textContent =
    "Difficulty: " + data.difficulty;
}

setInterval(updateDifficulty, 5000);
updateDifficulty();

/* ---------------------------------------------------------
   SINGULARITY ANIMATION ENGINE (unchanged, optimized)
--------------------------------------------------------- */

const wallpaper = document.getElementById('wallpaper');
const bubbleCount = 25;
let bubbles = [];
let isBlackHoleActive = false;
let singularity = null;
let singularityPos = { x: 0, y: 0 };

const icons = {
  blsr: 'https://cryptologos.cc/logos/bitcoin-btc-logo.svg?v=024',
  metamask: 'https://upload.wikimedia.org/wikipedia/commons/3/36/MetaMask_Fox.svg',
  polygon: 'https://cryptologos.cc/logos/polygon-matic-logo.svg?v=024'
};

const iconTypes = ['blsr','metamask','polygon','metamask','polygon'];

const blackholeSfx = document.getElementById('blackhole-sfx');
const minerUi = document.getElementById('miner-ui');
const minerStatus = document.getElementById('miner-status');
const lastTxEl = document.getElementById('last-tx');

function playBlackHoleSound() {
  blackholeSfx.currentTime = 0;
  blackholeSfx.play().catch(()=>{});
}

function flashBlockSolvedUI(text) {
  const old = minerStatus.textContent;
  minerStatus.textContent = text || "Block solved! Minting BLSR…";
  minerUi.classList.add("block-solved");
  setTimeout(()=>{
    minerStatus.textContent = old;
    minerUi.classList.remove("block-solved");
  },2500);
}

function createBubble() {
  const type = iconTypes[Math.floor(Math.random()*iconTypes.length)];
  const size = Math.random()*40+50;
  const el = document.createElement("div");
  el.className = `bubble ${type}`;
  el.style.width = `${size}px`;
  el.style.height = `${size}px`;

  const img = document.createElement("img");
  img.src = icons[type];
  el.appendChild(img);
  wallpaper.appendChild(el);

  bubbles.push({
    el, type, size,
    x: Math.random()*window.innerWidth,
    y: Math.random()*window.innerHeight,
    vx: (Math.random()-0.5)*1.5,
    vy: (Math.random()-0.5)*1.5,
    isBeingSucked: false
  });
}

function spawnParticleBurst(x,y,count=30){
  for(let i=0;i<count;i++){
    const p=document.createElement("div");
    p.className="particle";
    wallpaper.appendChild(p);

    const angle=Math.random()*Math.PI*2;
    const speed=40+Math.random()*80;
    const dx=Math.cos(angle)*speed;
    const dy=Math.sin(angle)*speed;

    p.style.transform=`translate3d(${x}px,${y}px,0)`;

    requestAnimationFrame(()=>{
      p.style.transform=`translate3d(${x+dx}px,${y+dy}px,0) scale(0.2)`;
      p.style.opacity="0";
    });

    setTimeout(()=>p.remove(),700);
  }
}

function spawnGravityWave(x,y){
  const wave=document.createElement("div");
  wave.className="gravity-wave";
  wallpaper.appendChild(wave);

  wave.style.transform=`translate3d(${x-20}px,${y-20}px,0) scale(0.2)`;

  requestAnimationFrame(()=>{
    wave.style.transform=`translate3d(${x-100}px,${y-100}px,0) scale(5)`;
    wave.style.opacity="0";
  });

  setTimeout(()=>wave.remove(),1300);
}

function animateBubbles(timestamp){
  bubbles.forEach(b=>{
    if(!isBlackHoleActive || !b.isBeingSucked || !singularity){
      b.x+=b.vx;
      b.y+=b.vy;

      if(b.x<=0||b.x+b.size>=window.innerWidth) b.vx*=-1;
      if(b.y<=0||b.y+b.size>=window.innerHeight) b.vy*=-1;

      const floatOffset=Math.sin(timestamp/1000+b.x*0.01)*10;
      b.el.style.transform=`translate3d(${b.x}px,${b.y+floatOffset}px,0)`;
    } else {
      const cx=b.x+b.size/2;
      const cy=b.y+b.size/2;
      const dx=singularityPos.x-cx;
      const dy=singularityPos.y-cy;
      const dist=Math.max(40,Math.hypot(dx,dy));

      const pull=0.12;
      b.x+=(dx/dist)*dist*pull*0.05;
      b.y+=(dy/dist)*dist*pull*0.05;

      const scale=Math.max(0,1-pull*3);
      const spin=timestamp*0.01;

      b.el.style.opacity=scale;
      b.el.style.transform=`translate3d(${b.x}px,${b.y}px,0) scale(${scale}) rotate(${spin}deg)`;
    }
  });

  requestAnimationFrame(animateBubbles);
}

function onBlockSolved(text){
  if(isBlackHoleActive) return;
  isBlackHoleActive=true;

  const blsrBubbles=bubbles.filter(b=>b.type==="blsr");
  if(blsrBubbles.length===0){isBlackHoleActive=false;return;}

  singularity=blsrBubbles[Math.floor(Math.random()*blsrBubbles.length)];
  singularity.el.classList.add("singularity");

  singularityPos.x=singularity.x+singularity.size/2;
  singularityPos.y=singularity.y+singularity.size/2;

  playBlackHoleSound();
  flashBlockSolvedUI(text);
  spawnGravityWave(singularityPos.x,singularityPos.y);
  spawnParticleBurst(singularityPos.x,singularityPos.y);

  bubbles.forEach(b=>{
    if(b!==singularity) b.isBeingSucked=true;
  });

  setTimeout(()=>{
    bubbles.forEach(b=>{ if(b.type!=="blsr") b.el.remove(); });
    bubbles=bubbles.filter(b=>b.type==="blsr");

    const respawn=bubbleCount-bubbles.length;
    for(let i=0;i<respawn;i++) createBubble();

    singularity.el.classList.remove("singularity");
    singularity=null;

    isBlackHoleActive=false;
  },2200);
}

function init(){
  for(let i=0;i<bubbleCount;i++) createBubble();
  requestAnimationFrame(animateBubbles);
}

init();
</script>

</body>
</html>
