services:
  - type: web
    name: bitcoinsolar-dashboard
    env: node
    plan: starter
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        sync: false
      - key: SESSION_EXPIRES_DAYS
        value: "7"

  - type: worker
    name: ai-orchestrator
    env: node
    plan: starter
    buildCommand: cd ai-orchestrator && npm install
    startCommand: cd ai-orchestrator && npm run start
    envVars:
      - key: NODE_ENV
        value: production
