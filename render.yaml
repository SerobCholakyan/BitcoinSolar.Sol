services:
  - type: web
    name: bitcoinsolar-webapp
    env: node
    plan: starter
    region: oregon
    rootDir: ai-orchestrator/webapp
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: 22

  - type: worker
    name: bitcoinsolar-orchestrator
    env: node
    plan: starter
    region: oregon
    rootDir: ai-orchestrator
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: INFURA_ETH
        sync: false
      - key: INFURA_POLYGON
        sync: false
