name: BLSR Backend CI/CD

on:
  push:
    branches: [ main ]
    paths:
      - "blsr-miner-backend/**"
      - ".github/workflows/blsr-backend-ci.yml"

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./blsr-miner-backend
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/blsr-backend:latest

  deploy-to-k8s:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up kubectl
        uses: azure/setup-kubectl@v4

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG_BLSR }}" > ~/.kube/config

      - name: Update deployment image
        run: |
          kubectl set image deployment/blsr-backend blsr-backend=ghcr.io/${{ github.repository_owner }}/blsr-backend:latest

