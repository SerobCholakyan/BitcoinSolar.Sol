name: AI Orchestrator Build

on:
  push:
    branches: [main]
    paths:
      - "ai-orchestrator/**"
      - ".github/workflows/ai-orchestrator.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install deps
        run: pnpm install

      - name: Build orchestrator
        run: pnpm --filter ai-orchestrator build
