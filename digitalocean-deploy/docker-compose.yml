version: "3.9"

services:
  blsr-backend:
    build: ../blsr-miner-backend
    container_name: blsr-backend
    restart: always
    env_file:
      - ./env/backend.env
    ports:
      - "8080:8080"

  nginx:
    image: nginx:latest
    container_name: blsr-nginx
    restart: always
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt
    ports:
      - "80:80"
      - "443:443"
