user nginx;
worker_processes auto;

events {
    worker_connections 1024;
}

http {
    sendfile on;
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Rate limiting: 10 requests/sec per IP, burst up to 20
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;

    upstream blsr_backend {
        server blsr-backend:8080;
    }

    # Redirect HTTP to HTTPS
    server {
        listen 80;
        server_name api.bitcoinsolar.org;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        server_name api.bitcoinsolar.org;

        ssl_certificate /etc/letsencrypt/live/api.bitcoinsolar.org/fullchain.pem;
        ssl_certificate_key /etc/letsencrypt/live/api.bitcoinsolar.org/privkey.pem;

        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options DENY always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;

        location / {
            limit_req zone=api burst=20 nodelay;

            proxy_pass http://blsr_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
