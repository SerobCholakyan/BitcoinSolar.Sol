name: Backend CI/CD

on:
  push:
    paths:
      - "blsr-miner-backend/**"
      - ".github/workflows/backend-deploy.yml"
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    env:
      HARBOR_URL: ${{ secrets.HARBOR_URL }}
      HARBOR_PROJECT: ${{ secrets.HARBOR_PROJECT }}
      HARBOR_USERNAME: ${{ secrets.HARBOR_USERNAME }}
      HARBOR_PASSWORD: ${{ secrets.HARBOR_PASSWORD }}
      REGISTRY_IMAGE: ${{ vars.REGISTRY_IMAGE }}
      K8S_SERVER: ${{ secrets.K8S_SERVER }}
      K8S_TOKEN: ${{ secrets.K8S_TOKEN }}
      K8S_NAMESPACE: ${{ secrets.K8S_NAMESPACE }}
      K8S_DEPLOYMENT_NAME: ${{ vars.K8S_DEPLOYMENT_NAME }}
      ENVIRONMENT: ${{ vars.ENVIRONMENT }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: vars
        run: |
          TAG=${GITHUB_SHA::7}
          echo "tag=${TAG}" >> $GITHUB_OUTPUT

      - name: Login to Harbor
        run: |
          echo "${HARBOR_PASSWORD}" | docker login "${HARBOR_URL}" -u "${HARBOR_USERNAME}" --password-stdin

      - name: Build backend image
        working-directory: blsr-miner-backend
        run: |
          docker build -t "${REGISTRY_IMAGE}:${{ steps.vars.outputs.tag }}" .

      - name: Push backend image
        run: |
          docker push "${REGISTRY_IMAGE}:${{ steps.vars.outputs.tag }}"

      - name: Setup kubectl
        run: |
          mkdir -p $HOME/.kube
          cat <<EOF > $HOME/.kube/config
          apiVersion: v1
          kind: Config
          clusters:
          - cluster:
              server: ${K8S_SERVER}
              insecure-skip-tls-verify: true
            name: cluster
          contexts:
          - context:
              cluster: cluster
              user: deployer
              namespace: ${K8S_NAMESPACE}
            name: deploy
          current-context: deploy
          users:
          - name: deployer
            user:
              token: ${K8S_TOKEN}
          EOF

      - name: Deploy to Kubernetes
        run: |
          kubectl -n "${K8S_NAMESPACE}" set image deployment/${K8S_DEPLOYMENT_NAME} backend="${REGISTRY_IMAGE}:${{ steps.vars.outputs.tag }}"
          kubectl -n "${K8S_NAMESPACE}" rollout status deployment/${K8S_DEPLOYMENT_NAME}
