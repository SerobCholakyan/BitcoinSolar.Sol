<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>BitcoinSolar Node Console</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: radial-gradient(circle at top, #1f2937 0, #020617 55%, #000 100%);
      color: #e5e7eb;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .shell {
      width: 100%;
      max-width: 720px;
      border-radius: 24px;
      padding: 2rem;
      background: linear-gradient(145deg, rgba(15,23,42,0.95), rgba(3,7,18,0.98));
      box-shadow: 0 25px 60px rgba(0,0,0,0.75), 0 0 24px rgba(251,191,36,0.35);
      border: 1px solid rgba(148,163,184,0.25);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 0.5rem;
      font-size: 1.8rem;
    }
    p {
      margin-top: 0;
      margin-bottom: 1.5rem;
      color: #9ca3af;
    }
    input {
      width: 100%;
      padding: 0.6rem 0.8rem;
      border-radius: 999px;
      border: 1px solid rgba(55,65,81,0.9);
      background: rgba(15,23,42,0.9);
      color: #e5e7eb;
      outline: none;
      margin-bottom: 0.75rem;
    }
    button {
      padding: 0.6rem 1rem;
      border-radius: 999px;
      border: none;
      cursor: pointer;
      font-weight: 600;
    }
    .btn-primary {
      background: linear-gradient(135deg, #facc15, #f97316, #fb923c);
      color: #111827;
    }
    .btn-secondary {
      background: linear-gradient(135deg, #22c55e, #4ade80);
      color: #022c22;
    }
    .row {
      display: flex;
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    pre {
      background: rgba(15,23,42,0.9);
      border-radius: 16px;
      padding: 1rem;
      border: 1px solid rgba(55,65,81,0.8);
      max-height: 260px;
      overflow: auto;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="shell">
    <h1>BitcoinSolar Node Console</h1>
    <p>Test your node address against the BitcoinSolar web API.</p>

    <input id="address" placeholder="Enter your EVM address (0x...)" />

    <div class="row">
      <button class="btn-primary" onclick="callMine()">/api/mine</button>
      <button class="btn-secondary" onclick="callVerify()">/api/verify</button>
    </div>

    <div class="row">
      <button class="btn-secondary" onclick="callSubmit()">/api/submit</button>
      <button class="btn-primary" onclick="callReward()">/api/reward</button>
    </div>

    <pre id="output">Awaiting response…</pre>
  </div>

  <script>
    async function postJSON(path, body) {
      const res = await fetch(path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body || {})
      });
      const text = await res.text();
      try {
        return JSON.parse(text);
      } catch {
        return { raw: text };
      }
    }

    function getAddress() {
      return document.getElementById('address').value.trim();
    }

    function setOutput(data) {
      document.getElementById('output').textContent = JSON.stringify(data, null, 2);
    }

    async function callMine() {
      const address = getAddress();
      const res = await postJSON('/api/mine', { address });
      setOutput(res);
    }

    async function callVerify() {
      const address = getAddress();
      const res = await postJSON('/api/verify', { address });
      setOutput(res);
    }

    async function callSubmit() {
      const address = getAddress();
      const share = 'mock-share-' + Math.random().toString(16).slice(2);
      const res = await postJSON('/api/submit', { address, share });
      setOutput(res);
    }

    async function callReward() {
      const address = getAddress();
      const amount = 0.01;
      const res = await postJSON('/api/reward', { address, amount });
      setOutput(res);
    }
  </script>
</body>
</html>
