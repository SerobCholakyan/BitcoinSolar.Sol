<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BLSR // NEURAL_PULSE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #020205; color: #fff; font-family: 'Fira Code', monospace; overflow: hidden; }
        .neon-red { color: #ff003c; text-shadow: 0 0 20px #ff003c, 0 0 40px #ff003c; font-weight: 900; }
        .neon-cyan { color: #00ffa3; text-shadow: 0 0 10px #00ffa3; }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(15px); border: 1px solid rgba(0, 255, 163, 0.2); }
        .char { transition: color 0.05s; }
        @keyframes pulse-red { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .final-lock { animation: pulse-red 0.5s infinite; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center">
    
    <div class="glass w-full max-w-xl p-10 rounded-[2.5rem] relative z-10">
        <div class="flex justify-between items-center mb-10">
            <h1 class="text-xs tracking-[0.4em] opacity-40 uppercase">Lynnic_Neural_Link</h1>
            <div id="spinner" class="text-4xl font-black opacity-20 transition-all duration-500">0</div>
        </div>

        <div id="terminal" class="h-48 overflow-y-auto mb-8 text-[11px] space-y-1 font-mono leading-tight">
            <div class="opacity-20">> SYSTEM_IDLE...</div>
        </div>

        <div class="space-y-4">
            <input type="text" id="wallet" placeholder="0x_HEX_ADDRESS" 
                   class="w-full bg-black/40 border-b border-white/10 p-4 focus:outline-none focus:border-[#00ffa3] transition-all text-center">
            <button onclick="executeSequence()" class="w-full py-5 bg-white text-black font-black rounded-2xl hover:bg-[#00ffa3] transition-all tracking-widest uppercase">
                Initialize_Sync
            </button>
        </div>
    </div>

    <audio id="bg-loop" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-10.mp3"></audio>
    <audio id="snd-tick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>
    <audio id="snd-lock" src="https://assets.mixkit.co/active_storage/sfx/2568/2568-preview.mp3"></audio>

    <script>
        const neonColors = ['#00ffa3', '#00d4ff', '#bc00ff', '#ffea00'];
        const terminal = document.getElementById('terminal');
        const spinner = document.getElementById('spinner');

        function addLog(text) {
            const line = document.createElement('div');
            terminal.appendChild(line);
            text.split('').forEach((c, i) => {
                const s = document.createElement('span');
                s.innerText = c;
                s.style.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                setTimeout(() => line.appendChild(s), i * 20);
            });
            terminal.scrollTop = terminal.scrollHeight;
        }

        async function executeSequence() {
            document.getElementById('bg-loop').play();
            const addr = document.getElementById('wallet').value;
            if(!addr) return;

            addLog(`> AUTHENTICATING_NODE_${addr.slice(0,8)}...`);
            addLog(`> ESTABLISHING_LYNNIC_AMBIENCE...`);

            // Spinner Logic: 0 to 10
            for(let i = 0; i <= 10; i++) {
                spinner.innerText = i;
                spinner.style.color = neonColors[Math.floor(Math.random() * neonColors.length)];
                spinner.style.opacity = "1";
                document.getElementById('snd-tick').currentTime = 0;
                document.getElementById('snd-tick').play();
                await new Promise(r => setTimeout(r, 100));
            }

            // Final Lock: Neon Red
            const luckyBlock = Math.floor(Math.random() * 9) + 1;
            spinner.innerText = luckyBlock;
            spinner.className = "text-7xl neon-red final-lock";
            document.getElementById('snd-lock').play();
            
            addLog(`> JOB_ACCEPTED // BLOCK_${luckyBlock}_RESOLVED`);
            addLog(`> MINING_REWARD_TRANSMITTED`);
        }
    </script>
</body>
</html>
