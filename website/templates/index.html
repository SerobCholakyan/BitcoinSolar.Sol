<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GEMINI_PULSE // BLSR_CORE</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #030305; color: #fff; font-family: sans-serif; overflow: hidden; }
        .orb { position: absolute; width: 300px; height: 300px; background: #00ffa3; filter: blur(100px); opacity: 0.1; top: -50px; left: -50px; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); border: 1px solid rgba(0, 255, 163, 0.2); border-radius: 30px; }
        .neon-text { color: #00ffa3; text-shadow: 0 0 10px #00ffa3; }
        .btn-sync { background: linear-gradient(135deg, #00ffa3, #00d4ff); color: #000; font-weight: bold; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4">
    <div class="orb"></div>
    <div class="glass w-full max-w-md p-10 text-center shadow-2xl">
        <h1 class="text-xs tracking-widest opacity-40 mb-4 uppercase font-mono">Quantum_Node_Active</h1>
        <h2 class="text-4xl font-light mb-8">Gemini<span class="font-bold neon-text">Pulse</span></h2>
        
        <div class="space-y-4">
            <input type="text" id="wallet" placeholder="0x_DESTINATION_ADDRESS" 
                   class="w-full bg-black/40 border-b border-cyan-900 p-4 text-center focus:outline-none focus:border-[#00ffa3] transition-all">
            
            <button onclick="runPulse()" class="btn-sync w-full py-5 rounded-2xl shadow-lg hover:brightness-110 active:scale-95 transition-all">
                SYNC_CONSCIOUSNESS
            </button>
        </div>

        <div id="log" class="mt-10 text-[10px] opacity-30 font-mono h-12 overflow-hidden leading-tight italic">
            > WAITING_FOR_SYNC...
        </div>
    </div>

    <script>
        async function runPulse() {
            const log = document.getElementById('log');
            const addr = document.getElementById('wallet').value;
            log.innerHTML = `> ATTEMPTING_LINK_TO_${addr.slice(0,8)}...`;
            
            const res = await fetch('/api/mine', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({address: addr})
            });
            const data = await res.json();
            log.innerHTML = `> SYNC_COMPLETE: TX_${data.tx.slice(0,16)}...`;
        }
    </script>
</body>
</html>
