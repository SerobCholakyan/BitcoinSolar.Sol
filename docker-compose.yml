version: "3.9"

services:
  blsr-backend:
    build: ./blsr-miner-backend
    container_name: blsr-backend
    env_file:
      - ./blsr-miner-backend/.env
    networks:
      - blsr-net

  nginx:
    image: nginx:stable
    container_name: blsr-nginx
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/bitcoinsolar.org.conf:/etc/nginx/conf.d/bitcoinsolar.org.conf:ro
      - ./nginx/api.bitcoinsolar.org.conf:/etc/nginx/conf.d/api.bitcoinsolar.org.conf:ro
      - ./nginx/dashboard.bitcoinsolar.org.conf:/etc/nginx/conf.d/dashboard.bitcoinsolar.org.conf:ro
      - ./nginx/operator.bitcoinsolar.org.conf:/etc/nginx/conf.d/operator.bitcoinsolar.org.conf:ro
      - ./www:/var/www:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - blsr-backend
    networks:
      - blsr-net

  prometheus:
    image: prom/prometheus:latest
    container_name: blsr-prometheus
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    networks:
      - blsr-net

  grafana:
    image: grafana/grafana:latest
    container_name: blsr-grafana
    volumes:
      - ./monitoring/grafana:/etc/grafana
    ports:
      - "3000:3000"
    networks:
      - blsr-net

networks:
  blsr-net:
    driver: bridge
