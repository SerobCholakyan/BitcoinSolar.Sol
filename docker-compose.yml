version: "3.9"

services:
  dashboard:
    build: .
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - SESSION_EXPIRES_DAYS=7
    depends_on:
      - orchestrator

  orchestrator:
    build: ./ai-orchestrator
    environment:
      - NODE_ENV=production
