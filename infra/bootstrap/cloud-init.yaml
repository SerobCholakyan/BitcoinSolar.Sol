#cloud-config
package_update: true
package_upgrade: true

packages:
  - git
  - python3
  - python3-pip
  - nginx
  - ufw
  - docker.io
  - docker-compose-plugin

runcmd:
  - ufw default deny incoming
  - ufw default allow outgoing
  - ufw allow ssh
  - ufw allow http
  - ufw allow https
  - ufw --force enable

  - usermod -aG docker root

  - mkdir -p /opt/blsr
  - cd /opt/blsr
  - git clone https://github.com/SerobCholakyan/BitcoinSolar.Sol repo || true

  - mkdir -p /opt/blsr/deploy
  - cp -r repo/digitalocean-deploy/* /opt/blsr/deploy/ || true

  - cd /opt/blsr/deploy
  - docker compose up -d --build
