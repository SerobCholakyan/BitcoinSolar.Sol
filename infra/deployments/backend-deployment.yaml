apiVersion: apps/v1
kind: Deployment
metadata:
  name: bitcoinsolar-backend
  labels:
    app: bitcoinsolar-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: bitcoinsolar-backend
  template:
    metadata:
      labels:
        app: bitcoinsolar-backend
    spec:
      containers:
        - name: backend
          image: ${REGISTRY_IMAGE}:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: BLSR_RPC_URL
              valueFrom:
                secretKeyRef:
                  name: bitcoinsolar-secrets
                  key: BLSR_RPC_URL
            - name: BLSR_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: bitcoinsolar-secrets
                  key: BLSR_PRIVATE_KEY
            - name: BLSR_CONTRACT_ADDRESS
              valueFrom:
                secretKeyRef:
                  name: bitcoinsolar-secrets
                  key: BLSR_CONTRACT_ADDRESS
            - name: MINING_DIFFICULTY
              valueFrom:
                secretKeyRef:
                  name: bitcoinsolar-secrets
                  key: MINING_DIFFICULTY
            - name: BACKEND_PORT
              value: "8080"
